# WorkerSpinLockFix - default configuration.
#
# This file is read once at SKSEPlugin_Load. Changes require a game
# restart to take effect.
#
# The plugin lives in `Data/SKSE/Plugins/WorkerSpinLockFix.dll`. This
# config file should be installed alongside the DLL at the same path
# but with the .toml extension.

[plugin]
# Master kill-switch. If false, the plugin loads but does NOT install
# hooks. Use this to A/B test without rebuilding or removing the DLL.
enabled = true

[log]
# Emit a one-line WARN entry whenever a hook waited at least this many
# milliseconds before entering its serialized section. 0 disables the
# warning.
#
# Default 1 ms = "any visible blocking, even on otherwise idle hardware".
# If your install genuinely contends, raise to 5 or 10 to reduce log noise.
contention_warn_ms = 1

# How often the plugin emits a one-line counter dump for each hooked
# function. 0 disables the periodic dump entirely.
stats_interval_s = 60

# Trace-level logging of every hook entry/exit. SPAMMY. Off by default.
# Only flip on for short controlled experiments where you need to see
# the call cadence.
trace_each_call = false
