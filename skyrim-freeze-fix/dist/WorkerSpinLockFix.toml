# WorkerSpinLockFix - default configuration.
#
# This file is read once at SKSEPlugin_Load. Changes require a game
# restart to take effect.
#
# The plugin lives in `Data/SKSE/Plugins/WorkerSpinLockFix.dll`. This
# config file should be installed alongside the DLL at the same path
# but with the .toml extension.

[plugin]
# Master kill-switch. If false, the plugin loads but does NOT install
# the entry-point hook or the reaper. Use this to A/B test without
# rebuilding or removing the DLL.
enabled = true

[log]
# How often the plugin emits a one-line counter dump for the wait-graph
# detector and reaper. 0 disables the periodic dump entirely.
stats_interval_s = 60

[acquire_hook]
# Emergency kill-switch for the entry-point hook on BSSpinLock::Acquire.
# If false, the hook is NOT installed and the plugin runs reaper-only.
# Set to false if any AcquireHook-class regression (hot-path overhead,
# prologue collision with another mod, etc.) makes the game unplayable
# without rebuilding or removing the DLL.
enabled = true

[breaker]
# When the surgical hook detects a confirmed AB-BA cycle on the two
# engine BSSpinLocks the plugin watches, the breaker force-releases one
# of them via CAS so the spinning thread can proceed. The thread that
# THOUGHT it owned the released lock keeps running its critical section
# without protection until it next releases; this is acceptable because
# the alternative is a permanent freeze and the engine's invariants on
# this critical section appear robust to brief unguarded execution
# (no save corruption observed in vanilla Skyrim where the same race
# happens transiently).
#
# Set this to false to revert to detect-only diagnostics (logs cycles,
# never breaks).
break_enabled = true

# Wall-clock duration (milliseconds) a cycle topology must remain
# observable before the breaker will force-release a lock. The first
# thread to detect a cycle claims the confirmation flow, sleeps this
# long, then re-runs WaitGraph::VerifyCycleStillPresent. If the cycle
# has self-resolved during the window the breaker stands down; if it
# is still present the lock is force-released. A short window is fine
# because a true deadlock is observed thousands of times per
# millisecond, while a transient near-cycle resolves itself in
# microseconds.
#
# Set to 0 to break on first detection without a wait (not recommended:
# any near-cycle that the engine would have resolved on its own gets
# broken anyway).
confirmation_window_ms = 2

# If true, the first observation of any new cycle signature, every
# confirmation crossing, and every break attempt (success or race) are
# logged. Recommended on so any break that actually fires can be
# audited from the log.
log_cycle_events = true

[phase4_defer]
# v2.0 structural fix layered on top of the v1.0 runtime breaker.
# One inline hook (a wrap on the LockA acquirer at id 19369) plus
# TWO call-site patches inside the cycle hub defer LockB acquires
# whenever the current thread is inside the LockA acquirer.
# Deferred calls drain on the same thread immediately after the
# LockA acquirer returns, so per-thread call ordering is preserved
# and LockB is acquired with no AB-BA hazard.
#
# v2.0.1 evolved twice in pre-release:
#
#   - First cut: three function-wrap inline hooks (id 19369 wrap +
#     id 40333 / id 40334 entry gates). Fixed the skyshard
#     regression by switching id 19369's wrap to `bool`-returning
#     and capturing the result via unsafe_call<bool>. Also split
#     the deferred operation so the kInTempChangeList bit toggle on
#     Actor::boolBits (bit 9 of [actor+0xe0]) runs SYNCHRONOUSLY
#     in the gate; only the LockB-protected bucket-array update is
#     deferred.
#
#   - Second cut (current): the function-wraps on id 40333 / id 40334
#     have been replaced with two call-site patches inside the
#     cycle hub:
#       * id 36016+0xdcb  (the engine's direct call to id 40334)
#       * id 19372+0x606  (the inner call to id 40333 from the
#                          AddToTempChangeList wrapper that the
#                          cycle hub reaches via id 36016+0xfa3)
#     These two call sites are the only paths through which id
#     40333 / id 40334 are reachable while LockA is held. Patching
#     them instead of the function entries shrinks the gate's
#     blast radius to exactly the cycle path; callers of id 40333
#     / id 40334 from outside the cycle no longer pay the gate
#     cost at all, and any other mod that hooks the function
#     entries continues to work for those callers and continues to
#     run when this plugin drains the deferred queue. The
#     synchronous bit toggle is preserved.
#
# When this is enabled the v1.0 runtime breaker (surgical hook on
# BSSpinLock::Acquire + WaitGraph + Breaker + Reaper) becomes the
# safety net rather than the primary mechanism: the structural fix
# stops the cycle from forming in the first place. Both layers are
# orthogonal -- if the structural fix misses any cycle path
# (an indirect call we did not decode, a future engine code change,
# an interaction with another mod), the runtime breaker still
# catches and force-releases.
#
# See docs/case-study/22-v2-phase4-1-cycle-hub-characterisation.md
# for the v2.0 design and the original (insufficient) correctness
# audit; docs/case-study/24-v2-0-1-skyshard-regression-fix.md for
# the v2.0.1 first-cut retrospective (bool-returning wrap fix +
# defensive synchronous bit toggle); and
# docs/case-study/25-v2-0-1-callsite-refactor.md for the v2.0.1
# second-cut retrospective (function-wraps -> call-site patches,
# informed by analysis of GarrixWong's skyrim-freeze-fix).
#
# Default: true. Set to false to revert to the v1.0 runtime-breaker-
# only behaviour without rebuilding or removing the DLL.
enabled = true

# Per-call diagnostic logging for Phase4Defer. Each entry into the
# LockA wrap and each entry into the two LockB gates emits a log
# line with the arguments, the captured return value, and the
# deferred-queue depth. Volume is high during gameplay (hundreds of
# lines per second) but spdlog buffers writes asynchronously, so
# the in-game cost is low.
#
# Use this to diagnose regressions in scripted-animation activators
# (skyshards, idle pickups, etc.) where the symptom alone doesn't
# pinpoint which hook is at fault. Workflow:
#
#   1. Set diagnostic_logging = true and start the game.
#   2. Walk to the affected interaction (e.g. a skyshard).
#   3. Press E once. Wait two seconds.
#   4. Quit. Set diagnostic_logging = false.
#   5. Read SKSE\\Logs\\WorkerSpinLockFix.log.
#
# What to look for:
#   - LockA-WRAP-ENTER lines around the time of the interaction
#     prove the hook is even being entered.
#   - The result= field on LockA-WRAP-EXIT shows whether the
#     activation chain reported success.
#   - ADD-DEFER / REMOVE-DEFER lines show queued LockB calls.
#   - DRAIN lines show the queue being flushed after the wrap returns.
#
# Default: false.
diagnostic_logging = false

[reaper]
# Stale-owner reaper, retained as a safety net for cases the entry-
# point hook does not see (threads that died still holding a lock,
# indirect dispatches the hook never observes). Detects only stale-
# owner patterns (owner thread is dead). The surgical AB-BA breaker
# handles live-owner cycles directly.
#
# v2.0.3 redesign: the reaper now consumes a snapshot of the
# WaitGraph wait edges populated by the AcquireHook slow path. It no
# longer enumerates process threads, no longer calls SuspendThread /
# GetThreadContext / ResumeThread, and no longer scans registers and
# stack windows for plausible BSSpinLock candidates. The full
# rationale for retiring the suspension-based scan -- including why
# adding a timeout wrapper around GetThreadContext is strictly worse
# than the hypothetical hang it would mitigate -- is in
# docs/case-study/26-reaper-snapshot-removed.md.
#
# As a result, the reaper now requires `[acquire_hook] enabled =
# true` to do anything useful. With AcquireHook off the WaitGraph is
# empty and every reaper tick is a no-op.
#
# DISABLED by default: the surgical hook is sufficient for the
# documented engine bug, and even with the new design the reaper is
# the only background thread the plugin spawns. Re-enable manually
# if you want the stale-owner backstop in addition to the surgical
# hook.
enabled = false

# Reaper poll interval (milliseconds). Stale-owner deadlocks last
# forever, so long latency between scans is acceptable; the steady-
# state cost of a WaitGraph snapshot at this interval is negligible.
interval_ms = 30000

[test_mode]
# Synthetic AB-BA validation harness.
#
# When enabled, after Skyrim's data files finish loading the plugin
# spawns two worker threads that deliberately AB-BA two heap-allocated
# test BSSpinLocks via the real BSSpinLock::Acquire (id 12210). The two
# test locks are routed through the surgical filter just like the
# engine BSSpinLocks; the breaker's confirmation flow detects the
# cycle, sleeps confirmation_window_ms, verifies the cycle is still
# present, and force-releases one of the test locks. Both worker
# threads then complete and the log emits:
#
#   [TEST] SUCCESS - both workers completed. The breaker detected the
#   synthetic AB-BA, confirmed it via the time-based flow, and force-
#   released one test lock. End-to-end cycle break is proven.
#
# If the breaker fails to fire within 10 seconds the harness logs
# [TEST] FAILURE and manually clears the test locks so the workers can
# drain.
#
# The test does NOT touch the engine's BSSpinLocks. It is completely
# isolated and safe. Engine state is never modified.
#
# Default: false. Enable, restart the game once, observe the result,
# then set back to false for normal play.
enabled = false
